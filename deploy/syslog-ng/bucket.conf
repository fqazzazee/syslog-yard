@version: 4.8

# syslog-bucket front-end receiver (suite edition): accept syslog on the wire,
# hand structured JSON lines to the syslog-bucket ingest worker. Identical to
# apps/syslog-bucket/deploy/syslog-ng/syslog-ng.conf except the destination
# host matches the suite service name.

options {
    keep-hostname(yes);
    use-dns(no);
    frac-digits(3);
    time-reopen(2);
};

# RFC3164 (classic BSD syslog)
source s_rfc3164 {
    network(transport("udp") port(514));
    network(transport("tcp") port(514));
};

# RFC5424 (modern syslog protocol)
source s_rfc5424 {
    syslog(transport("tcp") port(601));
};

destination d_bucket {
    network("syslog-bucket" port(6601) transport("tcp")
        template("$(format-json time=\"${ISODATE}\" host=\"${HOST}\" app=\"${PROGRAM}\" pid=\"${PID}\" msgid=\"${MSGID}\" facility=\"${FACILITY}\" severity=\"${LEVEL}\" message=\"${MESSAGE}\" source_ip=\"${SOURCEIP}\")\n")
    );
};

log {
    source(s_rfc3164);
    source(s_rfc5424);
    destination(d_bucket);
};
