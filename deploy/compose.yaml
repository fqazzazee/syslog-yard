# syslog-yard — generate → route/filter → store, on one internal bridge.
#
#   syslog-hose  UI  http://localhost:8080   (traffic generator)
#   syslog-valve UI  http://localhost:8081   (visual router)
#   syslog-bucket UI http://localhost:8082   (email-style triage)
#
# External syslog entry point: host port 6514 (udp/tcp) → the valve's
# "External IN" block (container port 6514) — add one in the valve UI and
# Apply; its enabled toggle turns external intake on/off. Internal traffic
# (the hose) uses container port 514, so the two route independently.
# Forward to bucket-syslog:514 to land entries in syslog-bucket. The
# bucket's receiver is internal-only.
# (6514 = IANA syslog-TLS; chosen over 5514 which collided with a local
# ssh forward on this host. Run `scripts/yardctl firewall` to open ports.)

name: syslog-yard

networks:
  yardnet:

volumes:
  hose-data:
  valve-data:
  bucket-dbdata:
  # ---- external share examples (full guide: ../docs/SHARES.md) --------
  # Define a share once here, then hand it to any tool as /shares/<name>
  # (and list the name in that tool's YARD_SHARES env). For rootless
  # podman, prefer bind-mounting a share already mounted on the host:
  #   volumes: [ /mnt/nas/syslog:/shares/archive ]
  #
  # logshare-nfs:
  #   driver: local
  #   driver_opts:
  #     type: nfs
  #     o: addr=nas.example.lan,rw,nfsvers=4
  #     device: ":/export/syslog"
  #
  # logshare-smb:
  #   driver: local
  #   driver_opts:
  #     type: cifs
  #     o: username=user,password=pass,uid=0,file_mode=0660,dir_mode=0770
  #     device: "//nas.example.lan/syslog"

services:
  syslog-hose:
    build:
      # context is apps/ so the image can also copy apps/shared
      context: ../apps
      dockerfile: syslog-hose/Dockerfile
    image: syslog-hose:latest
    networks: [yardnet]
    ports:
      - "8080:8080"
    environment:
      HOSE_ADDR: ":8080"
      HOSE_DATA: /data
      # Neighbor hint: new jobs default to this destination (editable).
      HOSE_SUGGESTED_DEST: "syslog-valve:514"
      # Cross-tool nav links. A bare port resolves against whatever host
      # the browser used to reach this UI; set full URLs instead when the
      # tools live behind a reverse proxy or on different hosts.
      YARD_LINK_HOSE: "8080"
      YARD_LINK_VALVE: "8081"
      YARD_LINK_BUCKET: "8082"
      # Guard this UI with the bucket's user accounts (docs/AUTH.md).
      # Remove to run the hose open/standalone.
      YARD_AUTH_URL: "http://syslog-bucket:8080"
    volumes:
      - hose-data:/data
    restart: unless-stopped

  syslog-valve:
    build:
      # context is apps/ so the image can also copy apps/shared
      context: ../apps
      dockerfile: syslog-valve/Dockerfile
    image: syslog-valve:latest
    networks: [yardnet]
    ports:
      - "8081:8081"
      # External senders target the HOST port (e.g. <yard-host>:6514) and
      # land on the valve's "External IN" block (container port 6514) —
      # wire one in the UI and Apply. Add more pairs to publish listeners
      # on other container ports.
      - "6514:6514/udp"
      - "6514:6514/tcp"
      # Classic syslog port, for devices that can't send anywhere else.
      # 514 is privileged: rootful docker/podman binds it as-is; rootless
      # podman needs the host to allow it first:
      #   echo net.ipv4.ip_unprivileged_port_start=514 | sudo tee /etc/sysctl.d/50-syslog-yard.conf
      #   sudo sysctl --system
      # Then uncomment, re-up, and open the port (yardctl firewall covers
      # only 6514): sudo ufw allow 514  /  firewall-cmd --add-port=514/{udp,tcp}
      # - "514:6514/udp"
      # - "514:6514/tcp"
    environment:
      VALVE_ADDR: ":8081"
      VALVE_DATA: /data
      VALVE_SUGGESTED_FORWARD: "bucket-syslog:514"
      YARD_LINK_HOSE: "8080"
      YARD_LINK_VALVE: "8081"
      YARD_LINK_BUCKET: "8082"
      # Guard this UI with the bucket's user accounts (docs/AUTH.md).
      # Remove to run the valve open/standalone.
      YARD_AUTH_URL: "http://syslog-bucket:8080"
      # YARD_SHARES: "archive"     # external shares — see docs/SHARES.md
    volumes:
      - valve-data:/data
      # - logshare-nfs:/shares/archive
    restart: unless-stopped

  bucket-db:
    image: docker.io/library/postgres:17-alpine
    networks: [yardnet]
    environment:
      POSTGRES_USER: syslog_bucket
      POSTGRES_PASSWORD: syslog_bucket
      POSTGRES_DB: syslog_bucket
    volumes:
      - bucket-dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syslog_bucket"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  syslog-bucket:
    build:
      # context is apps/ so the image can also copy apps/shared
      context: ../apps
      dockerfile: syslog-bucket/Dockerfile
    image: syslog-bucket:latest
    networks: [yardnet]
    ports:
      - "8082:8080"
    environment:
      BUCKET_DB_URL: postgres://syslog_bucket:syslog_bucket@bucket-db:5432/syslog_bucket?sslmode=disable
      BUCKET_API_ADDR: ":8080"
      BUCKET_INGEST_ADDR: ":6601"
      YARD_LINK_HOSE: "8080"
      YARD_LINK_VALVE: "8081"
      YARD_LINK_BUCKET: "8082"
      # Initial admin password, first start only. Left unset on purpose so a
      # strong random password is generated and printed once in the log —
      # find it with `scripts/yardctl logs syslog-bucket | grep -i password`,
      # or set a fresh random one anytime with `scripts/yardctl reset-admin`.
      # Uncomment to pin a known password instead.
      # BUCKET_ADMIN_PASSWORD: "change-me"
      # Optional OIDC sign-in (Keycloak / Authentik / Entra ID / Google):
      # BUCKET_OIDC_ISSUER: "https://idp.example.com/realms/yard"
      # BUCKET_OIDC_CLIENT_ID: "syslog-bucket"
      # BUCKET_OIDC_CLIENT_SECRET: "…"
      # BUCKET_OIDC_REDIRECT_URL: "http://localhost:8082/api/auth/oidc/callback"
      # BUCKET_OIDC_NAME: "Company SSO"      # login-button label
      # BUCKET_OIDC_DEFAULT_ROLE: "analyst"  # role for first-time OIDC users
      # BUCKET_COOKIE_SECURE: "true"         # set when serving over HTTPS
    depends_on:
      bucket-db:
        condition: service_healthy
    restart: unless-stopped

  bucket-syslog:
    image: docker.io/balabit/syslog-ng:4.8.3
    command: ["--no-caps", "-F"]
    networks: [yardnet]
    volumes:
      - ./syslog-ng/bucket.conf:/etc/syslog-ng/syslog-ng.conf:ro
    # Internal-only: reached via the valve (or other yardnet services).
    depends_on:
      - syslog-bucket
    restart: unless-stopped
